<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avenhade</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      scroll-behavior: smooth;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Orbitron', sans-serif; 
      background: radial-gradient(circle at center, #0b0f2e, #050617);
      color: #e0e4ff;
      line-height: 1.6;
      overflow-x: hidden;
    }

    p {
      font-family: 'Open Sans', sans-serif;
    }

    header {
      background: rgba(0, 0, 0, 0.7);
      padding: 20px 40px;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1f2233;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: #82aaff;
      text-decoration: none;
      margin: 0 15px;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #fff;
    }

    .menu-toggle {
      display: none;
      cursor: pointer;
    }

    .menu-toggle div {
      width: 25px;
      height: 3px;
      background-color: #82aaff;
      margin: 5px 0;
      transition: 0.4s;
    }

    .mobile-menu {
      display: none;
      flex-direction: column;
      align-items: flex-start;
      position: absolute;
      top: 80px;
      background-color: rgba(0, 0, 0, 0.9);
      width: 100%;
      padding: 10px;
      transform: translateY(-20px);
      transition: transform 0.3s ease-out;
    }

    .mobile-menu.open {
      display: flex;
      transform: translateY(0);
    }

    .mobile-menu a {
      margin: 10px 0;
      font-size: 1.2rem;
    }

    .section {
      padding: 120px 40px 60px;
      max-width: 1000px;
      margin: auto;
    }

    .title {
      font-size: 2.5em;
      margin-bottom: 20px;
      color: #82aaff;
    }

    .icon-links a {
      display: inline-block;
      margin: 0 10px;
      transition: transform 0.3s;
    }

    .icon-links a:hover {
      transform: scale(1.2);
    }

    footer {
      text-align: center;
      padding: 30px;
      font-size: 0.9em;
      color: #888;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Media queries */
    @media (max-width: 768px) {
      nav {
        flex-direction: column;
        align-items: flex-start;
      }

      .menu-toggle {
        display: block;
      }

      nav a {
        display: none;
      }

      .mobile-menu {
        display: flex;
      }

      .section {
        padding: 80px 20px 40px;
      }

      .title {
        font-size: 2em;
      }

      iframe {
        width: 100%;
      }

      .icon-links a img {
        width: 35px;
        height: 35px;
      }

      footer {
        padding: 20px 10px;
      }
    }

  </style>
</head>
<body>
  <header>
    <nav>
      <div><strong>Avenhade</strong></div>
      <div class="menu-toggle" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
      </div>
      <div class="mobile-menu">
        <a href="#pitch">Projet</a>
        <a href="#bio">À propos</a>
        <a href="#recrutement">Recrutement</a>
        <a href="#ecoute">Écoute</a>
      </div>
      <div>
        <a href="#pitch">Projet</a>
        <a href="#bio">À propos</a>
        <a href="#recrutement">Recrutement</a>
        <a href="#ecoute">Écoute</a>
      </div>
    </nav>
  </header>

  <section class="section fade-in" id="pitch">
    <h2 class="title">Le projet Avenhade</h2>
    <p>
       TEST
    </p>
  </section>

  <section class="section fade-in" id="bio">
    <h2 class="title">Mon Histoire</h2>
    <p>
     TEST
    </p>
  </section>

  <section class="section fade-in" id="recrutement">
    <h2 class="title">Recrutement</h2>
    <p>
       TEST TEST TEST
    </p>
    <p><a href="https://forms.gle/example" style="color:#82aaff">→ Formulaire de recrutement</a></p>
  </section>

  <section class="section fade-in" id="ecoute">
    <h2 class="title">Écoute la maquette</h2>
    <p>
      Liens + lecteur intégré
    </p>
    
    <iframe width="100%" height="166" scrolling="no" frameborder="no" 
            src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/ID_DE_TA_MAQUETTE&color=%2382aaff&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false">
    </iframe>
    
    <div class="icon-links">
      <a href="https://soundcloud.com/avenhade" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/82aaff/soundcloud.png" alt="SoundCloud" />
      </a>
      <a href="https://youtube.com/avenhade" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/82aaff/youtube-play.png" alt="YouTube" />
      </a>
    </div>
  </section>

  <footer>
    &copy; 2025 Avenhade. Tous droits réservés.
  </footer>

  <script>
    // Fonction pour basculer le menu mobile
    function toggleMenu() {
      const mobileMenu = document.querySelector('.mobile-menu');
      mobileMenu.classList.toggle('open');
    }

    const faders = document.querySelectorAll('.fade-in');
    const appearOptions = {
      threshold: 0.1,
      rootMargin: "0px 0px -50px 0px"
    };

    const appearOnScroll = new IntersectionObserver(function(entries, observer) {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add("visible");
        observer.unobserve(entry.target);
      });
    }, appearOptions);

    faders.forEach(fader => {
      appearOnScroll.observe(fader);
    });
  </script>
</body>
</html>

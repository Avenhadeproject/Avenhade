<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avenhade</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
      padding: 0;
    }
    .hero {
      background: url('https://images.unsplash.com/photo-1495567720989-cebdbdd97913') center/cover no-repeat;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .hero h1 {
      font-size: 3rem;
      background: rgba(0,0,0,0.6);
      padding: 1rem 2rem;
      border-radius: 10px;
    }
    .content {
      padding: 2rem;
      max-width: 600px;
      margin: auto;
    }
    .video {
      margin-top: 2rem;
    }
    .links a {
      color: #1DB954;
      margin: 0 1rem;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>AVENHADE</h1>
  </div>
  <div class="content">
    <h2>About</h2>
    <p>Avenhade is a dark cinematic project mixing epic orchestration and post-breakup emotions into massive soundscapes. This is the story of loss, power, and rebirth.</p>

    <div class="video">
      <h2>Watch the clip</h2>
      <iframe width="100%" height="315" src="https://www.youtube.com/embed/YOUR_VIDEO_ID" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="links">
      <h2>Listen on</h2>
      <a href="#">Spotify</a>
      <a href="#">Apple Music</a>
      <a href="#">Deezer</a>
    </div>
  </div>
</body>
</html>

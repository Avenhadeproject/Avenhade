<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avenhade</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      background: url('https://images.pexels.com/photos/30665591/pexels-photo-30665591/free-photo-of-voyage-en-train-de-nuit-a-teheran.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1') no-repeat center center fixed;
      background-size: cover;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      max-width: 600px;
      text-align: center;
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      gap: 20px;
      margin-bottom: 60px;
    }

    .buttons a {
      text-decoration: none;
      background: rgba(255, 255, 255, 0.1);
      padding: 12px 24px;
      border-radius: 8px;
      color: white;
      border: 1px solid white;
      transition: background 0.3s;
    }

    .buttons a:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .listen-section {
      margin-top: 80px;
      font-size: 1.5rem;
      background-color: rgba(0, 0, 0, 0.4);
      padding: 20px 40px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Avenhade</h1>
    <p>This website is under construction.</p>

    <div class="buttons">
      <a href="#">About</a>
      <a href="#">Lore</a>
      <a href="#">Gallery</a>
    </div>

    <div class="listen-section">
      <strong>Test</strong> Test
    </div>
  </div>
</body>
</html>
